<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
</head>
<body>
    <h2>Student Registration</h2>
    
    <form onsubmit="return validateForm()">
        Roll Number (7 digits): <input type="text" id="rollno"><br><br>
        Name (alphabets only): <input type="text" id="name"><br><br>
        Date of Birth: <input type="text" id="dob" placeholder="DD/MM/YYYY"><br><br>
        <input type="submit" value="Submit">
    </form>

    <script>
        function validateForm() {
            // Validate Roll Number - 7 digits
            var rollno = document.getElementById("rollno").value;
            if (rollno.length != 7 || isNaN(rollno)) {
                alert("Roll number must be exactly 7 digits");
                return false;
            }
            
            // Validate Name - alphabets only
            var name = document.getElementById("name").value;
            for (var i = 0; i < name.length; i++) {
                var char = name.charAt(i);
                if (!((char >= 'a' && char <= 'z') || (char >= 'A' && char <= 'Z') || char == ' ')) {
                    alert("Name should contain only alphabets");
                    return false;
                }
            }
            
            // Validate DOB - non-empty
            var dob = document.getElementById("dob").value;
            if (dob == "") {
                alert("Date of Birth cannot be empty");
                return false;
            }
            
            alert("Form submitted successfully!");
            return true;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Prime Number</title>
</head>
<body>
    <h2>Check Prime Number</h2>
    Enter number: <input type="text" id="num">
    <button onclick="checkPrime()">Check</button>
    <p id="result"></p>

    <script>
        function checkPrime() {
            var n = parseInt(document.getElementById("num").value);
            var isPrime = true;
            
            if (n <= 1) {
                isPrime = false;
            } else {
                for (var i = 2; i < n; i++) {
                    if (n % i == 0) {
                        isPrime = false;
                        break;
                    }
                }
            }
            
            if (isPrime) {
                document.getElementById("result").innerHTML = n + " is Prime";
            } else {
                document.getElementById("result").innerHTML = n + " is not Prime";
            }
        }
    </script>
</body>
</html>

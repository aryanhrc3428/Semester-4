        /* TOP HORIZONTAL FRAME - HEADER */
        /* ============================================ */
        .top-frame {

            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            height: auto;
        }

        /* College logo placeholder */
        .college-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 36px;
            color: #ffed4e;
            border: 3px solid white;
            flex-shrink: 0;
        }

        /* College header information */
        .college-info h1 {
            font-size: 32px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .college-info p {
            font-size: 14px;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        /* ============================================ */
        /* BOTTOM HORIZONTAL FRAME - SPLIT INTO 2 VERTICAL FRAMES */
        /* ============================================ */
        .bottom-frame {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT VERTICAL FRAME - NAVIGATION */
        .left-frame {
            width: 220px;
            background-color: rgb(34, 34, 34);
            color: white;
            padding: 0;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: 2px 0 4px rgba(0, 0, 0, 0.2);
        }

        .nav-title {
            background-color: rgb(250, 129, 18);
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 3px solid rgb(250, 129, 18);
            text-align: center;
        }

        /* Navigation list items */
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-menu li {
            margin: 0;
        }

        .nav-menu a {
            display: block;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgb(245, 231, 198);
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-menu a:hover {
            background-color: rgb(250, 129, 18);
            padding-left: 20px;
            color: white;
            font-weight: 500;
        }

        .nav-menu a.active {
            background-color: rgb(250, 129, 18);
            border-left: 4px solid rgb(34, 34, 34);
            padding-left: 20px;
            color: white;
            font-weight: bold;
        }

        /* RIGHT VERTICAL FRAME - CONTENT */
        .right-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: rgb(245, 231, 198);
            overflow: hidden;
        }

        /* Content header in right frame */
        .content-header {
            background-color: rgb(250, 243, 225);
            padding: 15px 20px;
            border-bottom: 2px solid rgb(245, 231, 198);
            font-weight: bold;
            color: rgb(34, 34, 34);
            font-size: 16px;
        }

        /* Iframe container */
        .content-body {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ============================================ */
        /* SCROLLBAR STYLING */
        /* ============================================ */
        .left-frame::-webkit-scrollbar,
        .content-body::-webkit-scrollbar {
            width: 8px;
        }

        .left-frame::-webkit-scrollbar-track,
        .content-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .left-frame::-webkit-scrollbar-thumb {
            background: rgb(250, 129, 18);
            border-radius: 4px;
        }

        .content-body::-webkit-scrollbar-thumb {
            background: rgb(250, 129, 18);
            border-radius: 4px;
        }

        .left-frame::-webkit-scrollbar-thumb:hover {
            background: rgb(250, 129, 18);
        }

        .content-body::-webkit-scrollbar-thumb:hover {
            background: rgb(250, 129, 18);
        }

        /* UTILITY CLASSES */
        /* ============================================ */
        .info-message {
            background-color: rgb(245, 231, 198);
            border-left: 4px solid rgb(250, 129, 18);
            padding: 15px;
            margin: 20px;
            border-radius: 4px;
            color: rgb(34, 34, 34);
            font-size: 13px;
            display: none;
        }

        .info-message.show {
            display: block;
        }

        /* Loading indicator */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #7f8c8d;
            font-size: 16px;

            .college-info h1 {

            }

            .left-frame {
                width: 150px;
            }

            .nav-menu a {
                font-size: 12px;
                padding: 10px 12px;
            }
        }

        /**
         * Load content based on the selected menu item
         * @param {string} section - The section to load
         */
        function loadContent(section) {
            // Update active navigation link
            navLinks.forEach(link => link.classList.remove('active'));
            event.target.closest('.nav-link').classList.add('active');

            const data = contentData[section];
            
            // Update header
            contentHeader.textContent = data.title;

            // Clear previous content
            contentBody.innerHTML = '';

            if (data.url) {
                // Check if sample content is available for external links
                if (data.sampleContent) {
                    // Display sample content with link to official page
                    const container = document.createElement('div');
                    container.innerHTML = `
                        <div style="padding: 0;">
                            <div style="background-color: rgb(250, 243, 225); padding: 15px 30px; border-bottom: 2px solid rgb(250, 129, 18); display: flex; justify-content: space-between; align-items: center;">
                                <p style="margin: 0; color: rgb(34, 34, 34); font-size: 14px;">
                                    📌 This is sample content. Click the button to view the official page →
                                </p>
                                <a href="${data.url}" target="_blank" rel="noopener noreferrer" 
                                   style="background-color: rgb(250, 129, 18); color: white; padding: 8px 16px; 
                                          text-decoration: none; border-radius: 4px; white-space: nowrap; font-weight: bold;">
                                    🔗 Official Page
                                </a>
                            </div>
                            <div style="overflow-y: auto; height: calc(100% - 50px);">
                                ${data.sampleContent}
                            </div>
                        </div>
                    `;
                    contentBody.appendChild(container);
                } else {
                    // External links cannot be embedded due to security policies (CORS)
                    const externalContent = document.createElement('div');
                    externalContent.style.cssText = `
                        padding: 40px;
                        background: white;
                        color: #333;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        height: 100%;
                    `;
                    
                    externalContent.innerHTML = `
                        <div style="max-width: 500px; text-align: center;">
                            <h2 style="color: #2c3e50; margin-bottom: 20px; font-size: 24px;">
                                🔒 External Content
                            </h2>
                            <p style="line-height: 1.8; margin-bottom: 20px; color: #666;">
                                This page is hosted on an external website and cannot be displayed directly in an embedded frame 
                                due to security policies (CORS protection).
                            </p>
                            
                            <div style="background-color: rgb(250, 243, 225); border-left: 4px solid rgb(250, 129, 18); padding: 15px; 
                                        margin: 20px 0; border-radius: 5px; text-align: left;">
                                <strong>Why?</strong>
                                <p style="margin: 10px 0 0 0; font-size: 13px;">
                                    Websites can prevent being embedded in iframes for security reasons. 
                                    This is standard web security practice.
                                </p>
                            </div>

                            <p style="margin: 30px 0 20px 0; font-size: 16px; color: #2c3e50;">
                                <strong>Click below to view the official page:</strong>
                            </p>
                            
                            <a href="${data.url}" target="_blank" rel="noopener noreferrer" 
                               style="display: inline-block; background-color: rgb(250, 129, 18); color: white; 
                                      padding: 12px 30px; text-decoration: none; border-radius: 5px; 
                                      font-weight: bold; transition: 0.3s; margin-bottom: 10px;">
                                🔗 Open in New Tab
                            </a>
                            
                            <p style="font-size: 12px; color: #999; margin-top: 15px;">
                                This will open the official Hansraj College website in a new tab.
                            </p>
                        </div>
                    `;
                    
                    contentBody.appendChild(externalContent);
                }
            } else if (data.content) {
                // Load internal HTML content
                contentBody.innerHTML = data.content;
            }
        }

        // Load home content on page load
        window.addEventListener('load', () => {
            loadContent('home');
        });
    </script>
